run:
  timeout: 3m
  go: "1.22"

linters:
  disable-all: true
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused

linters-settings:
  goimports:
    local-prefixes: github.com/rommel-ade/rommel/sandbox-daemon

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
