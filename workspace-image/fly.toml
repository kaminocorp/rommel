# Fly app for the Rommel workspace machines.
#
# Machines are created PER-WORKSPACE by the backend (Phase 4) via the
# Machines API; this file describes the app-level shape only. The image is
# built and pushed via workspace-image/scripts; Fly itself never builds it.
#
# Three deliberate non-declarations:
#
#   1. No [[services]] — workspaces are not exposed to the public internet.
#      Internal reachability is via .flycast / .internal DNS on the daemon
#      port (7777). The backend is the only thing that connects.
#
#   2. No [mounts] / volume declarations — volumes are per-workspace, created
#      by the backend at machine create time and attached at /workspace.
#      Declaring volumes here would make them app-wide (a classic Fly
#      footgun).
#
#   3. No auto-stop / auto-start in [[services]] — those are per-machine
#      flags the backend passes to machine_create, since `fly.toml`
#      describes the app, not individual machines.

app = "rommel-workspaces"
primary_region = "iad"

[build]
  # Image is built and pushed by workspace-image/scripts/push.sh.
  # `fly deploy` references this latest tag if ever invoked directly; in
  # production the backend pins to a SHA via the Machines API.
  image = "registry.fly.io/rommel-workspaces:latest"

[env]
  # ROMMEL_TOKEN_PUBKEY is baked into the image at /etc/rommel/token.pubkey
  # (see Decision 0.2). ROMMEL_WORKSPACE_ROOT is set as Dockerfile ENV
  # (Decision 0.4). ROMMEL_WID and any per-machine overrides are injected by
  # the backend via the Machines API.

# Internal port the daemon listens on.
[experimental]
  internal_port = 7777

# Phase 0 production cutover: public WSS reachability via Flycast.
# For the initial deploy we map a public hostname (e.g. workspaces.rommel.dev
# or daemon.rommel.dev) to this app and add a TCP service with TLS handler.
# The browser then receives daemon URLs like:
#   wss://{wid}.workspaces.rommel.dev/ws?token=...
# (or the exact per-machine / wildcard shape Fly provisions).
#
# This accepts the "direct exposure" trade-off for v1 speed (the original
# Phase 3 decision kept [[services]] absent for defense-in-depth). The real
# gate remains the short-lived EdDSA token + per-wid claim + scope enforcement
# inside the daemon. A later dedicated relay proxy (inside rommel-backend or
# a separate lightweight ingress) can be added if tighter isolation is required.
#
# Example service block (add via fly.toml or `fly services` / console):
#
# [[services]]
#   protocol = "tcp"
#   internal_port = 7777
#   # Fly edge terminates TLS for wss://
#   [[services.ports]]
#     port = 443
#     handlers = ["tls"]
#   [[services.concurrency]]
#     type = "connections"
#     soft_limit = 50
#     hard_limit = 100
#
# After adding the service + custom domain + DNS, set the backend secret:
#   ROMMEL_DAEMON_URL_TEMPLATE="wss://{wid}.workspaces.rommel.dev/ws"
#
# The template is already fully dynamic; no code change was required.

[[restart]]
  policy = "on-failure"
  retries = 3
