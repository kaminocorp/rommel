name: backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "proto/schemas/**"
      - "proto/clients/python/**"
      - "sandbox-daemon/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "proto/schemas/**"
      - "proto/clients/python/**"
      - "sandbox-daemon/**"
      - ".github/workflows/backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    # Phase 4: tests need real Postgres (RLS won't run on SQLite — risk 4.6
    # of the plan). Spin up a sidecar container; the test fixtures probe
    # localhost:5432 and skip cleanly if absent (local-dev parity).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rommel
          POSTGRES_PASSWORD: rommel
          POSTGRES_DB: rommel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rommel"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Skip if backend not yet scaffolded
        id: gate
        run: |
          if [ -f backend/pyproject.toml ]; then
            echo "scaffolded=true" >> "$GITHUB_OUTPUT"
          else
            echo "scaffolded=false" >> "$GITHUB_OUTPUT"
            echo "backend/ not yet scaffolded; nothing to do."
          fi

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.scaffolded == 'true'
        with:
          python-version: "3.12"

      # The Phase-4 integration gate spawns the actual daemon binary. We need
      # Go on the runner to build it. Skipping this step would just leave the
      # integration test skipped, defeating the gate.
      - uses: actions/setup-go@v5
        if: steps.gate.outputs.scaffolded == 'true'
        with:
          go-version: "1.23"
          cache-dependency-path: sandbox-daemon/go.sum

      - name: Regenerate Go proto client (daemon needs it to build)
        if: steps.gate.outputs.scaffolded == 'true'
        run: bash proto/codegen/go.sh

      - name: Build sandbox-daemon binary (for integration gate)
        if: steps.gate.outputs.scaffolded == 'true'
        run: make -C sandbox-daemon build

      - name: Install Poetry
        if: steps.gate.outputs.scaffolded == 'true'
        run: pipx install poetry

      - name: Install backend deps
        if: steps.gate.outputs.scaffolded == 'true'
        working-directory: backend
        run: poetry install --no-interaction --no-root

      - name: Apply migrations
        if: steps.gate.outputs.scaffolded == 'true'
        working-directory: backend
        env:
          ROMMEL_DATABASE_URL: postgresql+asyncpg://rommel:rommel@localhost:5432/rommel
          ROMMEL_DATABASE_MIGRATE_URL: postgresql://rommel:rommel@localhost:5432/rommel
          # Required by Settings but unused by alembic.
          ROMMEL_TOKEN_PRIVKEY: "placeholder"
          ROMMEL_DAEMON_URL_TEMPLATE: "ws://localhost:7777/ws"
          ROMMEL_SUPABASE_JWKS_URL: "https://example.invalid/jwks.json"
        run: poetry run alembic upgrade head

      - name: Lint
        if: steps.gate.outputs.scaffolded == 'true'
        working-directory: backend
        run: |
          poetry run ruff check .

      - name: Test
        if: steps.gate.outputs.scaffolded == 'true'
        working-directory: backend
        env:
          ROMMEL_DATABASE_URL: postgresql+asyncpg://rommel:rommel@localhost:5432/rommel
          ROMMEL_DATABASE_MIGRATE_URL: postgresql://rommel:rommel@localhost:5432/rommel
        run: poetry run pytest -q
